name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - name: Syntax check
        run: node --check core.js && node --check loadCore.js && node --check server.js && node --check http.js && node --check build-manifest.js && node --check test.js && node --check test-mcp.js && node --check test-http.js
      - name: Lint
        run: npm run lint
      - name: Manifest is in sync
        run: node build-manifest.js && git diff --exit-code manifest.json
      - name: Unit + contract test (no SDK)
        run: npm test
      - name: End-to-end MCP integration test
        run: npm run test:mcp
      - name: End-to-end HTTP API integration test
        run: npm run test:http
